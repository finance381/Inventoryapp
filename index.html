<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  width: 100%;
  max-width: 500px;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

h2 {
  margin-top: 0;
  font-weight: 600;
}

label {
  font-size: 14px;
  font-weight: 500;
  display: block;
  margin-bottom: 6px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
  margin-bottom: 15px;
  transition: 0.2s;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
}

textarea {
  resize: none;
  height: 80px;
}

.row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.mic-btn {
  background: #f1f3f5;
  border: none;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.mic-btn:hover {
  background: #e2e6ea;
}

.submit-btn {
  width: 100%;
  background: #667eea;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.submit-btn:hover {
  background: #5a67d8;
}

.submit-btn:disabled {
  background: grey;
  cursor: not-allowed;
}

.success {
  text-align: center;
  color: green;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Inventory Entry</h2>

  <label>Language</label>
  <select id="languageSelect">
    <option value="en-IN">English</option>
    <option value="hi-IN">Hindi</option>
  </select>

  <label>Item Name</label>
  <div class="row">
    <input type="text" id="itemName" placeholder="Enter item name">
    <button class="mic-btn" onclick="startSpeech('itemName')">🎤</button>
  </div>

  <label>Category</label>
  <div class="row">
    <input type="text" id="category" placeholder="Enter category">
    <button class="mic-btn" onclick="startSpeech('category')">🎤</button>
  </div>

  <label>Quantity</label>
  <input type="number" id="quantity" placeholder="Enter quantity">

  <label>Description</label>
  <div class="row">
    <textarea id="description" placeholder="Enter description"></textarea>
    <button class="mic-btn" onclick="startSpeech('description')">🎤</button>
  </div>

  <label>Upload Image</label>
  <input type="file" id="imageInput" accept="image/*">

  <button class="submit-btn" id="submitBtn" onclick="submitData()">Submit</button>

  <div class="success" id="successMsg"></div>
</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwLNR9cpQf_IkAWTqlxreGapw26rN-6vNl9IBQeNReg3bC6MH_Hvt5wczywEZmBo1mpWw/exec";

function startSpeech(fieldId) {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = document.getElementById("languageSelect").value;
  recognition.start();
  
  recognition.onresult = function(event) {
    document.getElementById(fieldId).value = event.results[0][0].transcript;
  };
}

function submitData() {
  const btn = document.getElementById("submitBtn");
  const successMsg = document.getElementById("successMsg");
  const file = document.getElementById("imageInput").files[0];

  if (!file) {
    alert("Please upload an image.");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Saving...";

  const reader = new FileReader();
  reader.readAsDataURL(file);

  reader.onload = function() {
    const base64Image = reader.result.split(",")[1];

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({
        itemName: document.getElementById("itemName").value,
        category: document.getElementById("category").value,
        quantity: document.getElementById("quantity").value,
        description: document.getElementById("description").value,
        language: document.getElementById("languageSelect").value,
        image: base64Image,
        imageType: file.type,
        imageName: file.name
      })
    })
    .then(res => res.json())
    .then(data => {
      successMsg.innerText = "Saved successfully!";
      btn.disabled = false;
      btn.innerText = "Submit";
      document.querySelector("form")?.reset();
    })
    .catch(err => {
      alert("Error saving data.");
      btn.disabled = false;
      btn.innerText = "Submit";
    });
  };
}

</script>

</body>
</html>
